<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guía de Nutrición</title>

    <script defer src="assets/js/leccion1.js"></script>
    <script defer src="assets/js/leccion2.js"></script>
    <script defer src="assets/js/leccion3.js"></script>
    <script defer src="assets/js/leccion4.js"></script>
    <script defer src="assets/js/leccion5.js"></script>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        section{
            background:white;
            padding:20px;
            margin-bottom:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        button{
            margin:5px;
            padding:8px 15px;
            cursor:pointer;
        }

        input,select{
            padding:6px;
            margin:5px;
        }

        #resultado,
        #resultado5,
        #totalCalorias{
            margin-top:15px;
            font-weight:bold;
        }

        #listaAlimentos5 button{
            display:block;
            margin-bottom:8px;
            width:220px;
        }

    </style>

</head>

<body>

<h1>🥗 Guía de Nutrición</h1>

<p>Proyecto Módulo 3.</p>



<!-- LECCION 2 -->


<section>

<h2>Lección 1 y 2</h2>
 <label>
    Se muestran mensajes en consola y se solicita información al usuario.
</label>


</section>


<!-- LECCION 3 -->


<section>

<h2>Lección 3 </h2>

<button onclick="mostrarAlimentos()">
Mostrar todos los alimentos
</button>

<button onclick="mostrarFrutas()">
Mostrar solamente frutas
</button>

<div id="resultado"></div>

</section>


<!-- LECCION 4 -->


<section>

<h2>Lección 4 </h2>

<label>Calorías desayuno</label>

<input
type="number"
id="desayuno"
placeholder="Ejemplo 350">

<br>

<label>Calorías almuerzo</label>

<input
type="number"
id="almuerzo"
placeholder="Ejemplo 650">

<br><br>

<button onclick="calcularNutricion()">Calcular calorías</button>

<div id="totalCalorias"></div>

</section>


<!-- LECCION 5 -->


<section>

<h2>Lección 5</h2>

<button onclick="mostrarAlimentos5()">Mostrar alimentos</button>

<br><br>

<div id="listaAlimentos5"></div>

<br>

<label>Selecciona un alimento</label>

<select id="alimentos"></select>

<button onclick="mostrarDetalleAlimento()">Ver detalle</button>

<div id="resultado5"></div>

</section>

</body>

</html>
